server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
  }

  location = /api/auth/session {
    default_type application/json;
    add_header Cache-Control "no-store";
    return 200 '{"userId":"$http_x_auth_user","email":"$http_x_auth_email","role":"$http_x_auth_role"}';
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Proxy Ollama — avoids mixed-content when app is served over HTTPS.
  # Browser calls /ollama/api/chat → nginx forwards to Ollama on host.
  location /ollama/ {
    proxy_pass http://host.docker.internal:11434/;
    proxy_http_version 1.1;
    # Ollama checks Origin against its allowlist (default: localhost only).
    # Override so it sees a trusted localhost origin instead of the public domain.
    proxy_set_header Host "localhost";
    proxy_set_header Origin "http://localhost";
    proxy_hide_header Access-Control-Allow-Origin;
    add_header Access-Control-Allow-Origin "*" always;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    add_header Cache-Control "no-store";
  }
}
